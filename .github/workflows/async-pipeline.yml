# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "pages"
          - "publish"
  pull_request_target:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"

permissions:
  contents: read

jobs:
  publish:
    name: publish
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish') || (github.event_name == 'release' && (github.event.action == 'published'))
    runs-on: ubuntu-latest
    environment:
      name: "npm-publish"
      url: "https://www.npmjs.com/package/@async/pipeline"
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/

      - name: Use current npm
        run: npm install -g npm@11.16.0


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job publish --output .async/actions/cache/publish-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: restore
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-only

      - name: Plan release package
        uses: async/actions/doctor@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: plan
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "npx --yes github:async/release#3892d94a4890600d26b812052aa58dec98b05bfb"
        env:
          CI: true

      - name: Inspect release package
        uses: async/actions/doctor@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: inspect
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "npx --yes github:async/release#3892d94a4890600d26b812052aa58dec98b05bfb"
        env:
          CI: true

      - name: Check release changelog
        uses: async/actions/doctor@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: changelog
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "npx --yes github:async/release#3892d94a4890600d26b812052aa58dec98b05bfb"
        env:
          CI: true

      - name: Render release notes
        uses: async/actions/doctor@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: notes
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "npx --yes github:async/release#3892d94a4890600d26b812052aa58dec98b05bfb"
        env:
          CI: true

      - name: Run pipeline task pack
        uses: async/actions/run@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Create or update GitHub Release
        uses: async/actions/publish@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          package-path: "packages/pipeline"
          mode: github-release
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          notes-file: .async/release/release-notes.md
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        uses: async/actions/publish@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          package-path: "packages/pipeline"
          mode: github-packages
          registry: "https://npm.pkg.github.com"
          dist-tag: "latest"
          token-env-name: GITHUB_TOKEN
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm package
        uses: async/actions/publish@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          package-path: "packages/pipeline"
          mode: npm
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          token-env-name: NODE_AUTH_TOKEN
          provenance: true
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run release doctor
        uses: async/actions/doctor@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: doctor
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "npx --yes github:async/release#3892d94a4890600d26b812052aa58dec98b05bfb"
          network: live
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: save
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  snapshot:
    name: snapshot
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job snapshot --output .async/actions/cache/snapshot-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: restore
          manifest: .async/actions/cache/snapshot-cache-manifest.json
          trust: read-only

      - name: Run pipeline task pack
        uses: async/actions/run@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Publish main package preview
        uses: async/actions/preview@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          package-path: "packages/pipeline"
          target-registry: "https://npm.pkg.github.com"
          mode: main
          comment: false
          token-env-name: "GITHUB_TOKEN"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: save
          manifest: .async/actions/cache/snapshot-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  verify:
    name: verify (${{ join(matrix.runner, ' ') }})
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'release' && (github.event.action == 'published'))
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ["ubuntu-latest"]
          - ["macos-latest"]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job verify --output .async/actions/cache/verify-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: restore
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: save
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}-${{ strategy.job-index }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  pages:
    name: pages
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'pages')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task docs.site --output .async/actions/cache/docs.site-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: restore
          manifest: .async/actions/cache/docs.site-cache-manifest.json
          trust: read-only

      - name: Run Pages target
        uses: async/actions/run@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task docs.site"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: save
          manifest: .async/actions/cache/docs.site-cache-manifest.json
          trust: read-write

      - name: Upload Pages artifact
        uses: async/actions/pages@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: static
          path: ".async/pages"

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  pages-deploy:
    name: pages-deploy
    needs: "pages"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: async/actions/pages@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          upload: false
          deploy: true

  dependabot-auto-merge:
    name: dependabot-auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge validated Dependabot PR
        uses: async/actions/dependabot-merge@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          actor: ${{ github.event.pull_request.user.login }}
          dependency-ecosystem: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          allowed-ecosystems: |
            github-actions
            npm
            deno
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-preview:
    name: package-preview
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Async runtimes
        uses: async/actions/setup@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task pack --output .async/actions/cache/package-preview-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: restore
          manifest: .async/actions/cache/package-preview-cache-manifest.json
          trust: read-only

      - name: Run package preview target
        uses: async/actions/run@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: save
          manifest: .async/actions/cache/package-preview-cache-manifest.json
          trust: read-write

      - name: Publish package preview
        uses: async/actions/preview@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          package-path: "packages/pipeline"
          target-registry: "https://npm.pkg.github.com"
          mode: pr
          comment: true
          token-env-name: "GITHUB_TOKEN"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  evidence:
    name: evidence
    needs: ["package-preview","pages","publish","snapshot","verify"]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Merge evidence manifests
        uses: async/actions/evidence@31d990ff5d1f74ed93c5ac7ea5cfe3f6b3709862 # v0.1.10
        with:
          mode: merge
          artifact-pattern: async-evidence-*
          manifest-path: .async/evidence/index.json
          summary-path: .async/evidence/index.md
          artifact-name: async-evidence-index
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Write generated source plan
        run: |
          mkdir -p .async/actions/source-impact
          cat > .async/actions/source-impact/verifyImpact-source-plan.json <<'ASYNC_SOURCE_PLAN'
          {
            "version": 1,
            "generatedBy": "@async/pipeline",
            "job": "verifyImpact",
            "sources": {

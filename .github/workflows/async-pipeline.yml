# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
  release:
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "pages"
          - "publish"
  pull_request_target:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"

permissions:
  contents: read

jobs:
  pages:
    name: pages
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'pages')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: true
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pipeline CLI
        run: pnpm build

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run pages
        env:
          CI: true

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ".async/pages"

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

  pages-deploy:
    name: pages-deploy
    needs: "pages"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  publish:
    name: publish
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish') || (github.event_name == 'release')
    runs-on: ubuntu-latest
    environment:
      name: "npm-publish"
      url: "https://www.npmjs.com/package/@async/pipeline"
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: true
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Use current npm
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pipeline CLI
        run: pnpm build

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run publish
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

  snapshot:
    name: snapshot
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: true
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pipeline CLI
        run: pnpm build

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run snapshot
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

  verify:
    name: verify (${{ join(matrix.runner, ' ') }})
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'release')
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ["ubuntu-latest"]
          - ["macos-latest"]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: true
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pipeline CLI
        run: pnpm build

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run verify
        env:
          CI: true

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

  dependabot-auto-merge:
    name: dependabot-auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify dependency update scope
        env:
          PACKAGE_ECOSYSTEM: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          DEPENDENCY_NAMES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          UPDATED_DEPENDENCIES_JSON: ${{ steps.dependabot-metadata.outputs.updated-dependencies-json }}
        run: |
          set -euo pipefail

          case "$PACKAGE_ECOSYSTEM" in
            github-actions|npm|deno) ;;
            *)
              echo "::error::Unsupported Dependabot ecosystem: $PACKAGE_ECOSYSTEM"
              exit 1
              ;;
          esac

          if [ -z "$DEPENDENCY_NAMES" ]; then
            echo "::error::Dependabot metadata did not include dependency names."
            exit 1
          fi

          dependency_count="$(jq 'length' <<<"$UPDATED_DEPENDENCIES_JSON")"
          if [ "$dependency_count" -eq 0 ]; then
            echo "::error::Dependabot metadata did not include updated dependencies."
            exit 1
          fi

      - name: Approve Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          review_decision="$(gh pr view "$PR_URL" --json reviewDecision -q .reviewDecision)"
          if [ "$review_decision" = "APPROVED" ]; then
            echo "PR is already approved."
          else
            gh pr review --approve "$PR_URL"
          fi

      - name: Wait for checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 1800))
          empty_since=""

          while [ "$SECONDS" -lt "$deadline" ]; do
            checks_json="$(gh pr checks "$PR_URL" --json name,bucket,workflow 2>/dev/null || true)"
            relevant_checks="$(jq '[.[] | select(.name != "dependabot-auto-merge" and .bucket != "skipping")]' <<<"${checks_json:-[]}")"
            check_count="$(jq 'length' <<<"$relevant_checks")"
            failing_count="$(jq '[.[] | select(.bucket == "fail" or .bucket == "cancel")] | length' <<<"$relevant_checks")"
            pending_count="$(jq '[.[] | select(.bucket == "pending")] | length' <<<"$relevant_checks")"

            if [ "$failing_count" -gt 0 ]; then
              echo "$relevant_checks"
              echo "::error::At least one check failed or was cancelled."
              exit 1
            fi

            if [ "$check_count" -eq 0 ]; then
              if [ -z "$empty_since" ]; then
                empty_since="$SECONDS"
              fi

              if [ $((SECONDS - empty_since)) -ge 90 ]; then
                echo "No non-auto-merge checks were reported after 90 seconds."
                exit 0
              fi
            elif [ "$pending_count" -eq 0 ]; then
              echo "All reported non-auto-merge checks passed or were skipped."
              exit 0
            else
              empty_since=""
            fi

            sleep 15
          done

          echo "::error::Timed out waiting for checks to finish."
          exit 1

      - name: Merge Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --squash --delete-branch "$PR_URL"

  package-preview:
    name: package-preview
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: true
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pipeline CLI
        run: pnpm build

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run package preview target
        run: pnpm async-pipeline run-task pack
        env:
          CI: true

      - name: Publish package preview
        run: pnpm async-pipeline publish github pr --package packages/pipeline --registry https://npm.pkg.github.com
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

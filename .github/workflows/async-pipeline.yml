# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "contract"
          - "hygiene"
          - "pages"
          - "publish"
          - "update-train"
          - "verifyImpact"
      package:
        description: "Package path or dependency package"
        required: false
        type: string
      version:
        description: "Package version"
        required: false
        type: string
  pull_request_target:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"

permissions:
  contents: read

jobs:
  publish:
    name: publish
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish') || (github.event_name == 'release' && (github.event.action == 'published'))
    needs: ["hygiene"]
    runs-on: ubuntu-latest
    environment:
      name: "npm-publish"
      url: "https://www.npmjs.com/package/@async/pipeline"
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/

      - name: Use current npm
        run: npm install -g npm@11.16.0


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job publish --output .async/actions/cache/publish-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-only

      - name: Run pipeline task pack
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Plan release package
        uses: async/actions/doctor@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: plan
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Inspect release package
        uses: async/actions/doctor@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: inspect
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Check release changelog
        uses: async/actions/doctor@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: changelog
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Render release notes
        uses: async/actions/doctor@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: notes
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Create or update GitHub Release
        uses: async/actions/publish@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: "packages/pipeline"
          mode: github-release
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          notes-file: .async/release/release-notes.md
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        uses: async/actions/publish@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: "packages/pipeline"
          mode: github-packages
          registry: "https://npm.pkg.github.com"
          dist-tag: "latest"
          token-env-name: GITHUB_TOKEN
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm package
        uses: async/actions/publish@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: "packages/pipeline"
          mode: npm
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          token-env-name: NODE_AUTH_TOKEN
          provenance: true
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run release doctor
        uses: async/actions/doctor@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: doctor
          package-path: "packages/pipeline"
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
          network: live
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  snapshot:
    name: snapshot
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job snapshot --output .async/actions/cache/snapshot-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/snapshot-cache-manifest.json
          trust: read-only

      - name: Run pipeline task pack
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Plan main package preview
        run: pnpm dlx github:async/release#v0.1.5 preview plan --package packages/pipeline --mode main --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json

      - name: Stage main package preview
        run: pnpm dlx github:async/release#v0.1.5 preview stage --package packages/pipeline --mode main --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json --registry https://npm.pkg.github.com

      - name: Inspect main package preview
        run: pnpm dlx github:async/release#v0.1.5 preview inspect --package packages/pipeline --mode main --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json

      - name: Publish main package preview
        id: async-main-package-preview-packages-pipeline
        uses: async/actions/preview@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: "packages/pipeline"
          target-registry: "https://npm.pkg.github.com"
          mode: main
          comment: false
          token-env-name: "GITHUB_TOKEN"
          release-package: "github:async/release#v0.1.5"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify main package preview
        if: steps.async-main-package-preview-packages-pipeline.outputs.package-spec != ''
        run: pnpm dlx github:async/release#v0.1.5 preview doctor --package packages/pipeline --mode main --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json --registry https://npm.pkg.github.com --network live
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/snapshot-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  verify:
    name: verify (${{ join(matrix.runner, ' ') }})
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'release' && (github.event.action == 'published'))
    needs: ["hygiene"]
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ["ubuntu-latest"]
          - ["macos-latest"]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job verify --output .async/actions/cache/verify-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}-${{ strategy.job-index }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  verifyImpact:
    name: verifyImpact
    if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verifyImpact')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24

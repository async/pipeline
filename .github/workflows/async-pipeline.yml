# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "pages"
          - "publish"
  pull_request_target:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"

permissions:
  contents: read

jobs:
  publish:
    name: publish
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish') || (github.event_name == 'release' && (github.event.action == 'published'))
    runs-on: ubuntu-latest
    environment:
      name: "npm-publish"
      url: "https://www.npmjs.com/package/@async/pipeline"
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup Async runtimes
        uses: async/actions/setup@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/

      - name: Use current npm
        run: npm install -g npm@11.16.0


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run pipeline task pack
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Create or update GitHub Release
        uses: async/actions/publish@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          package-path: "packages/pipeline"
          mode: github-release
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        uses: async/actions/publish@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          package-path: "packages/pipeline"
          mode: github-packages
          registry: "https://npm.pkg.github.com"
          dist-tag: "latest"
          token-env-name: GITHUB_TOKEN
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm package
        uses: async/actions/publish@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          package-path: "packages/pipeline"
          mode: npm
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          token-env-name: NODE_AUTH_TOKEN
          provenance: true
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run release doctor
        uses: async/actions/publish@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          package-path: "packages/pipeline"
          mode: doctor
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  snapshot:
    name: snapshot
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup Async runtimes
        uses: async/actions/setup@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run pipeline task pack
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Publish main package preview
        uses: async/actions/preview@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          package-path: "packages/pipeline"
          target-registry: "https://npm.pkg.github.com"
          mode: main
          comment: false
          token-env-name: "GITHUB_TOKEN"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  verify:
    name: verify (${{ join(matrix.runner, ' ') }})
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'release' && (github.event.action == 'published'))
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ["ubuntu-latest"]
          - ["macos-latest"]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup Async runtimes
        uses: async/actions/setup@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run pipeline job
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}-${{ strategy.job-index }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  pages:
    name: pages
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'pages')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup Async runtimes
        uses: async/actions/setup@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run Pages target
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task docs.site"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Upload Pages artifact
        uses: async/actions/pages@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: static
          path: ".async/pages"

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  pages-deploy:
    name: pages-deploy
    needs: "pages"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: async/actions/pages@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          upload: false
          deploy: true

  dependabot-auto-merge:
    name: dependabot-auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge validated Dependabot PR
        uses: async/actions/dependabot-merge@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          actor: ${{ github.event.pull_request.user.login }}
          dependency-ecosystem: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          allowed-ecosystems: |
            github-actions
            npm
            deno
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-preview:
    name: package-preview
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup Async runtimes
        uses: async/actions/setup@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run package preview target
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Publish package preview
        uses: async/actions/preview@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          package-path: "packages/pipeline"
          target-registry: "https://npm.pkg.github.com"
          mode: pr
          comment: true
          token-env-name: "GITHUB_TOKEN"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  evidence:
    name: evidence
    needs: ["package-preview","pages","publish","snapshot","verify"]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Merge evidence manifests
        uses: async/actions/evidence@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          mode: merge
          artifact-pattern: async-evidence-*
          manifest-path: .async/evidence/index.json
          summary-path: .async/evidence/index.md
          artifact-name: async-evidence-index
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

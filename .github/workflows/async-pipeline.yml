  verifyimpact-source-plan:
    name: verifyimpact-source-plan
    if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verifyImpact')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.source-plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |

                  "type": "git",
                  "url": "https://github.com/async/framework.git",
                  "path": ".async/sources/framework/4494f9be64b9ecdd",
                  "ref": "main"
                }
              ]
            }
          }
          ASYNC_SOURCE_PLAN

      - name: Validate source checkout
        uses: async/actions/source-impact@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: checkout
          source-plan: .async/actions/source-impact/verifyImpact-source-plan.json
          source-id: ${{ matrix.source }}
          ref: ${{ matrix.ref }}
          path: ${{ matrix.path }}

      - name: Prepare source checkout
        uses: async/actions/source-impact@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: prepare
          source-plan: .async/actions/source-impact/verifyImpact-source-plan.json
          source-id: ${{ matrix.source }}
          path: ${{ matrix.path }}

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task "${{ matrix.task }}" --output ".async/actions/cache/${{ matrix.source }}-${{ matrix.taskId }}-cache-manifest.json" --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/${{ matrix.source }}-${{ matrix.taskId }}-cache-manifest.json
          trust: read-only

      - name: Run source task
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task \"${{ matrix.task }}\""
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-${{ matrix.source }}-${{ matrix.taskId }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/${{ matrix.source }}-${{ matrix.taskId }}-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}-${{ strategy.job-index }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  pages:
    name: pages
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'pages')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task docs.site --output .async/actions/cache/docs.site-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/docs.site-cache-manifest.json
          trust: read-only

      - name: Run Pages target
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task docs.site"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/docs.site-cache-manifest.json
          trust: read-write

      - name: Upload Pages artifact
        uses: async/actions/pages@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: static
          path: ".async/pages"

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  pages-deploy:
    name: pages-deploy
    needs: "pages"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: async/actions/pages@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          upload: false
          deploy: true

  dependabot-auto-merge:
    name: dependabot-auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge validated Dependabot PR
        uses: async/actions/dependabot-merge@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          actor: ${{ github.event.pull_request.user.login }}
          dependency-ecosystem: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          allowed-ecosystems: |
            github-actions
            npm
            deno
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-preview:
    name: package-preview
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task pack --output .async/actions/cache/package-preview-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/package-preview-cache-manifest.json
          trust: read-only

      - name: Run package preview target
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/package-preview-cache-manifest.json
          trust: read-write

      - name: Plan PR package preview
        run: pnpm dlx github:async/release#v0.1.5 preview plan --package packages/pipeline --mode pr --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json --pr-number "${{ github.event.pull_request.number }}" --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Stage PR package preview
        run: pnpm dlx github:async/release#v0.1.5 preview stage --package packages/pipeline --mode pr --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json --registry https://npm.pkg.github.com --pr-number "${{ github.event.pull_request.number }}" --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Inspect PR package preview
        run: pnpm dlx github:async/release#v0.1.5 preview inspect --package packages/pipeline --mode pr --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json --pr-number "${{ github.event.pull_request.number }}" --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Publish package preview
        id: async-package-preview
        uses: async/actions/preview@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: "packages/pipeline"
          target-registry: "https://npm.pkg.github.com"
          mode: pr
          comment: true
          token-env-name: "GITHUB_TOKEN"
          release-package: "github:async/release#v0.1.5"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify PR package preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.async-package-preview.outputs.package-spec != ''
        run: pnpm dlx github:async/release#v0.1.5 preview doctor --package packages/pipeline --mode pr --namespace "${{ github.repository_owner }}" --source-repository "${{ github.repository }}" --source-sha "${{ github.sha }}" --evidence-dir .async/release --json --registry https://npm.pkg.github.com --network live --pr-number "${{ github.event.pull_request.number }}" --head-sha "${{ github.event.pull_request.head.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment package preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.async-package-preview.outputs.comment-body != ''
        uses: async/actions/comment@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: pr-comment
          repository: ${{ github.repository }}
          number: ${{ github.event.pull_request.number }}
          marker: ${{ steps.async-package-preview.outputs.comment-marker }}
          body: ${{ steps.async-package-preview.outputs.comment-body }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
            .async/release
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  contract:
    name: contract
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'contract')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run contract evidence
        uses: async/actions/contract@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: report
          checks: "api,claims,schema"
          package-path: "."
          schema-sources: |
            api-contract.json
            tests/claims.json
          schema-output: ".async/contract/schema.json"
          evidence-dir: ".async/contract"
          annotations: true
          fail-on: advisory

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
            .async/contract
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  hygiene:
    name: hygiene
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || (github.event_name == 'release' && github.event.action == 'published') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'hygiene' || github.event.inputs.job == 'publish' || github.event.inputs.job == 'verify'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
            deno@2
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: true
          dependency-cache-path: "pnpm-lock.yaml"
          registry-url: https://registry.npmjs.org/


      - name: Build pipeline CLI
        run: pnpm build

      - name: Run hygiene evidence
        uses: async/actions/hygiene@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: report
          profiles: "package,github,docs,release"
          package-path: "."
          evidence-dir: ".async/hygiene"
          annotations: true
          fail-on: generated-policy
          release-gate: true

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
            .async/hygiene
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  update-train:
    name: update-train
    needs: ["publish"]
    if: always() && ((github.event_name == 'release' && github.event.action == 'published' && needs['publish'].result == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'update-train'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dispatch update train
        uses: async/actions/update-train@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: ${{ github.event.inputs.package || 'packages/pipeline' }}
          repositories: |
            async/flow
            async/framework
          event-type: "async-dep-bump"
          source-repository: ${{ github.repository }}
          version: ${{ github.event.inputs.version || '' }}
          github-token: ${{ secrets.ASYNC_RELEASE_TRAIN_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  evidence:
    name: evidence
    needs: ["contract","hygiene","package-preview","pages","publish","snapshot","update-train","verify","verifyImpact","verifyimpact-source-plan","verifyimpact-sources"]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Merge evidence manifests
        uses: async/actions/evidence@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: merge
          artifact-pattern: async-evidence-*
          manifest-path: .async/evidence/index.json
          summary-path: .async/evidence/index.md
          artifact-name: async-evidence-index
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "dependency-bump"
          - "publish"
          - "update-train"
      package:
        description: "Package path or dependency package"
        required: false
        type: string
      version:
        description: "Package version"
        required: false
        type: string
  repository_dispatch:
    types:
      - "async-dep-bump"

permissions:
  contents: read

jobs:
  publish:
    name: publish
    if: (github.event_name == 'release' && (github.event.action == 'published')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: false
          registry-url: https://registry.npmjs.org/


      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job publish --output .async/actions/cache/publish-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run publish"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-write

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: false
          registry-url: https://registry.npmjs.org/


      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job verify --output .async/actions/cache/verify-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: restore
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          mode: save
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-write

  update-train:
    name: update-train
    needs: ["publish"]
    if: always() && ((github.event_name == 'release' && github.event.action == 'published' && needs['publish'].result == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'update-train'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dispatch update train
        uses: async/actions/update-train@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-path: ${{ github.event.inputs.package || '.' }}
          repositories: |
            async/flow
            async/framework
          event-type: "async-dep-bump"
          source-repository: ${{ github.repository }}
          version: ${{ github.event.inputs.version || '' }}
          github-token: ${{ secrets.ASYNC_RELEASE_TRAIN_TOKEN }}

  dependency-bump:
    name: dependency-bump
    if: (github.event_name == 'repository_dispatch' && github.event.action == 'async-dep-bump') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'dependency-bump')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Async runtimes
        uses: async/actions/setup@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          node-version: 24
          pnpm-version: 11.1.0
          npm-version: 11.16.0
          runtime: |
            node@24
          package-manager: pnpm
          install: true
          frozen-lockfile: true
          cache: false
          registry-url: https://registry.npmjs.org/

      - name: Apply dependency bump
        uses: async/actions/dependency-bump@1590fc528b0cb0e3634af121f9ee92948aa72e24 # v0.1.21
        with:
          package-name: ${{ github.event.client_payload.package || github.event.inputs.package || '' }}
          version: ${{ github.event.client_payload.version || github.event.inputs.version || '' }}
          allowed-packages: |
            @async/pipeline
          package-manager: "pnpm"
          verify: |
            pnpm async-pipeline sync generate
            pnpm test
          success-mode: push
          failure-mode: pull-request
          branch-prefix: "async/dependency-bump/"
          base-branch: "main"
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

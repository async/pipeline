# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "verify"

permissions:
  contents: read

jobs:
  verify:
    name: verify
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verify')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: 2

      - name: Install dependencies
        run: deno install --frozen=false

      - name: Check generated workflow
        run: deno run -A ../../packages/pipeline/dist/cli.js github check

      - name: Run pipeline job
        run: deno run -A ../../packages/pipeline/dist/cli.js run verify
        env:
          CI: true

      - name: Explain async-pipeline run
        if: failure()
        run: deno run -A ../../packages/pipeline/dist/cli.js explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "verify"

permissions:
  contents: read

jobs:
  verify:
    name: verify
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verify')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: 2

      - name: Install dependencies
        run: deno install --frozen=false

      - name: Write task cache manifest
        run: deno run -A ../../packages/pipeline/dist/cli.js cache manifest --job verify --output .async/actions/cache/verify-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@8e63d1f4bf6a136b428035aa810a15ddc987c068 # v0.1.22
        with:
          mode: restore
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@8e63d1f4bf6a136b428035aa810a15ddc987c068 # v0.1.22
        with:
          command: "deno run -A ../../packages/pipeline/dist/cli.js github check && deno run -A ../../packages/pipeline/dist/cli.js run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@8e63d1f4bf6a136b428035aa810a15ddc987c068 # v0.1.22
        with:
          mode: save
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-write

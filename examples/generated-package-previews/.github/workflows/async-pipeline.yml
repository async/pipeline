# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "verify"
  pull_request_target:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"

permissions:
  contents: read

jobs:
  verify:
    name: verify
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verify')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job verify --output .async/actions/cache/verify-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: restore
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: save
          manifest: .async/actions/cache/verify-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  dependabot-auto-merge:
    name: dependabot-auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge validated Dependabot PR
        uses: async/actions/dependabot-merge@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          actor: ${{ github.event.pull_request.user.login }}
          dependency-ecosystem: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          allowed-ecosystems: |
            github-actions
            npm
            deno
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-preview:
    name: package-preview
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task pack --output .async/actions/cache/package-preview-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: restore
          manifest: .async/actions/cache/package-preview-cache-manifest.json
          trust: read-only

      - name: Run package preview target
        uses: async/actions/run@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: save
          manifest: .async/actions/cache/package-preview-cache-manifest.json
          trust: read-write

      - name: Publish package preview
        id: async-package-preview
        uses: async/actions/preview@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          package-path: "."
          target-registry: "https://npm.pkg.github.com"
          mode: pr
          comment: true
          token-env-name: "GITHUB_TOKEN"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment package preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.async-package-preview.outputs.comment-body != ''
        uses: async/actions/comment@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: pr-comment
          repository: ${{ github.repository }}
          number: ${{ github.event.pull_request.number }}
          marker: ${{ steps.async-package-preview.outputs.comment-marker }}
          body: ${{ steps.async-package-preview.outputs.comment-body }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  evidence:
    name: evidence
    needs: ["package-preview","verify"]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Merge evidence manifests
        uses: async/actions/evidence@f81b4ae15d6a8c512a94bc3a2e866f807ad398a4 # v0.1.16
        with:
          mode: merge
          artifact-pattern: async-evidence-*
          manifest-path: .async/evidence/index.json
          summary-path: .async/evidence/index.md
          artifact-name: async-evidence-index
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "verify"
  pull_request_target:
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"

permissions:
  contents: read

jobs:
  verify:
    name: verify
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verify')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pipeline job
        uses: async/actions/run@v0
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

  dependabot-auto-merge:
    name: dependabot-auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge validated Dependabot PR
        uses: async/actions/dependabot-merge@v0
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          actor: ${{ github.event.pull_request.user.login }}
          dependency-ecosystem: ${{ steps.dependabot-metadata.outputs.package-ecosystem }}
          allowed-ecosystems: |
            github-actions
            npm
            deno
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-preview:
    name: package-preview
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run package preview target
        uses: async/actions/run@v0
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Publish package preview
        uses: async/actions/preview@v0
        with:
          package-path: "."
          target-registry: "https://npm.pkg.github.com"
          mode: pr
          comment: true
          token-env-name: "GITHUB_TOKEN"
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

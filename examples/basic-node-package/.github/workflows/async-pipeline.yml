# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "verify"

permissions:
  contents: read

jobs:
  nightly:
    name: nightly
    if: github.event_name == 'schedule' && github.event.schedule == '17 2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pipeline job
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run nightly"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

  verify:
    name: verify
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verify')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pipeline job
        uses: async/actions/run@e91fb515670a66c0694936c079de4061f6306d43 # v0.1.6
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verify"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

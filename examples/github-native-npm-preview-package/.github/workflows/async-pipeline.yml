# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  release:
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "mainSnapshot"
          - "prPreview"
          - "stableRelease"

permissions:
  contents: read

jobs:
  mainSnapshot:
    name: mainSnapshot
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'mainSnapshot')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run mainSnapshot
        env:
          CI: true

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

  prPreview:
    name: prPreview
    if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'prPreview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run prPreview
        env:
          CI: true

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

  stableRelease:
    name: stableRelease
    if: (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'stableRelease')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore task cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .async/cache
          key: async-pipeline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            async-pipeline-${{ runner.os }}-

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated workflow
        run: pnpm async-pipeline github check

      - name: Run pipeline job
        run: pnpm async-pipeline run stableRelease
        env:
          CI: true

      - name: Explain async-pipeline run
        if: failure()
        run: pnpm async-pipeline explain --run latest || true

      - name: Upload async-pipeline run evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: async-pipeline-${{ github.job }}-runs
          path: .async/runs
          if-no-files-found: ignore

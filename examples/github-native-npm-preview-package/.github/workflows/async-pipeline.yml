# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  release:
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "mainSnapshot"
          - "prPreview"
          - "stableRelease"

permissions:
  contents: read

jobs:
  mainSnapshot:
    name: mainSnapshot
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'mainSnapshot')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job mainSnapshot --output .async/actions/cache/mainSnapshot-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@87e033782ca1f84334d9e3a2543b0db064848fb7 # v0.1.14
        with:
          mode: restore
          manifest: .async/actions/cache/mainSnapshot-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@87e033782ca1f84334d9e3a2543b0db064848fb7 # v0.1.14
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run mainSnapshot"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@87e033782ca1f84334d9e3a2543b0db064848fb7 # v0.1.14
        with:
          mode: save
          manifest: .async/actions/cache/mainSnapshot-cache-manifest.json
          trust: read-write

  prPreview:

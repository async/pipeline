# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "verifyImpact"

permissions:
  contents: read

jobs:
  verifyImpact:
    name: verifyImpact
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verifyImpact')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job verifyImpact --output .async/actions/cache/verifyImpact-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: restore
          manifest: .async/actions/cache/verifyImpact-cache-manifest.json
          trust: read-only

      - name: Run pipeline job
        uses: async/actions/run@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run verifyImpact"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: save
          manifest: .async/actions/cache/verifyImpact-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  verifyimpact-source-plan:
    name: verifyimpact-source-plan
    if: (github.event_name == 'pull_request') || (github.event_name == 'push' && (github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'verifyImpact')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.source-plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false


      - name: Write generated source plan
        run: |
          mkdir -p .async/actions/source-impact
          cat > .async/actions/source-impact/verifyImpact-source-plan.json <<'ASYNC_SOURCE_PLAN'
          {
            "version": 1,
            "generatedBy": "@async/pipeline",
            "job": "verifyImpact",
            "sources": {
              "admin": {
                "id": "admin",
                "type": "path",
                "path": "repos/admin",
                "pipeline": "pipeline.ts",
                "writable": true,
                "prepare": [
                  "node tools/use-candidate.mjs ../.."
                ]
              },
              "storefront": {
                "id": "storefront",
                "type": "path",
                "path": "repos/storefront",
                "pipeline": "pipeline.mjs",
                "writable": true,
                "prepare": [
                  "node tools/use-candidate.mjs ../.."
                ]
              }
            },
            "matrix": {
              "include": [
                {
                  "task": "admin:test-design-system",
                  "source": "admin",
                  "taskId": "test-design-system",
                  "type": "path",
                  "path": "repos/admin"
                },
                {
                  "task": "storefront:test",
                  "source": "storefront",
                  "taskId": "test",
                  "type": "path",
                  "path": "repos/storefront"
                }
              ]
            }
          }
          ASYNC_SOURCE_PLAN

      - name: Plan source impact matrix
        id: source-plan
        uses: async/actions/source-impact@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: plan
          source-plan: .async/actions/source-impact/verifyImpact-source-plan.json
          output-matrix: true

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  verifyimpact-sources:
    name: verifyImpact source (${{ matrix.source }}:${{ matrix.taskId }})
    needs: "verifyimpact-source-plan"
    if: ${{ always() && needs['verifyimpact-source-plan'].result == 'success' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['verifyimpact-source-plan'].outputs.matrix || '{"include":[]}') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm runtime
        uses: pnpm/setup@cf03a9b516e09bc5a90f041fc26fc930c9dc631b # v1.0.0
        with:
          version: 11.1.0
          runtime: node@24
          install: false
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write generated source plan
        run: |
          mkdir -p .async/actions/source-impact
          cat > .async/actions/source-impact/verifyImpact-source-plan.json <<'ASYNC_SOURCE_PLAN'
          {
            "version": 1,
            "generatedBy": "@async/pipeline",
            "job": "verifyImpact",
            "sources": {
              "admin": {
                "id": "admin",
                "type": "path",
                "path": "repos/admin",
                "pipeline": "pipeline.ts",
                "writable": true,
                "prepare": [
                  "node tools/use-candidate.mjs ../.."
                ]
              },
              "storefront": {
                "id": "storefront",
                "type": "path",
                "path": "repos/storefront",
                "pipeline": "pipeline.mjs",
                "writable": true,
                "prepare": [
                  "node tools/use-candidate.mjs ../.."
                ]
              }
            },
            "matrix": {
              "include": [
                {
                  "task": "admin:test-design-system",
                  "source": "admin",
                  "taskId": "test-design-system",
                  "type": "path",
                  "path": "repos/admin"
                },
                {
                  "task": "storefront:test",
                  "source": "storefront",
                  "taskId": "test",
                  "type": "path",
                  "path": "repos/storefront"
                }
              ]
            }
          }
          ASYNC_SOURCE_PLAN

      - name: Validate source checkout
        uses: async/actions/source-impact@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: checkout
          source-plan: .async/actions/source-impact/verifyImpact-source-plan.json
          source-id: ${{ matrix.source }}
          ref: ${{ matrix.ref }}
          path: ${{ matrix.path }}

      - name: Prepare source checkout
        uses: async/actions/source-impact@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: prepare
          source-plan: .async/actions/source-impact/verifyImpact-source-plan.json
          source-id: ${{ matrix.source }}
          path: ${{ matrix.path }}

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --task "${{ matrix.task }}" --output ".async/actions/cache/${{ matrix.source }}-${{ matrix.taskId }}-cache-manifest.json" --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: restore
          manifest: .async/actions/cache/${{ matrix.source }}-${{ matrix.taskId }}-cache-manifest.json
          trust: read-only

      - name: Run source task
        uses: async/actions/run@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task \"${{ matrix.task }}\""
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-${{ matrix.source }}-${{ matrix.taskId }}-runs
        env:
          CI: true

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: save
          manifest: .async/actions/cache/${{ matrix.source }}-${{ matrix.taskId }}-cache-manifest.json
          trust: read-write

      - name: Collect evidence manifest
        if: ${{ always() }}
        uses: async/actions/evidence@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: collect
          paths: |
            .async/runs
          receipt-paths: |
            .async/actions/receipts/**/*.json
          manifest-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/manifest.json"
          summary-path: ".async/evidence/${{ github.job }}-${{ strategy.job-index }}/summary.md"
          artifact-name: async-evidence-${{ github.job }}-${{ strategy.job-index }}
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

  evidence:
    name: evidence
    needs: ["verifyImpact","verifyimpact-source-plan","verifyimpact-sources"]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Merge evidence manifests
        uses: async/actions/evidence@cda9d1eeb37086a26187ff6c27f7f7c9a3650e34 # v0.1.11
        with:
          mode: merge
          artifact-pattern: async-evidence-*
          manifest-path: .async/evidence/index.json
          summary-path: .async/evidence/index.md
          artifact-name: async-evidence-index
          retention-days: 14
          if-no-files-found: warn
          include-summary: true

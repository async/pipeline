  kind: existing_plan
  tranche: "Implement the first local-first TypeScript workflow engine tranche in the async-pipeline repo."
  status: done
  oracle:
    signal: "pnpm release:check completes and pnpm async-pipeline doctor reports host and Lima readiness."
    cadence: "after Worker implementation and final Judge audit"
    final_proof: "Release gate commands pass, self pipeline creates a passing execution record, and packages pack cleanly."
  intake:
    original_request: "Implement the provided @async/pipeline plan in async-pipeline as a pnpm monorepo and dogfood it."
    interpreted_outcome: "Create a local-first @async/pipeline monorepo with core task/job/pipeline APIs, scheduler/store/cache, CLI, host and Lima runners, self pipeline, and pinned GitHub Actions invocation."
    input_shape: existing_plan
    audience: frontend developers building local-first task workflows
    authority: requested
    proof_type: test
    completion_proof: "pnpm release:check passes locally and the GoalBuddy Judge receipt marks the tranche complete."
    likely_misfire: "Shipping only docs or a skeleton without a runnable self-hosted pipeline and cache-backed execution store."
    blind_spots_considered:
      - "Package name should be @async/pipeline rather than the narrower @async/task."
      - "GitHub Actions should stay a thin invocation layer."
      - "Task primitives should stay in the same monorepo for now."
      - "Local cache must hash real input files, including common glob patterns."
    existing_plan_facts:
      - "Repo path: /Users/patrickjs/code/async-framework/async-pipeline"
      - "Use pnpm, Node ESM, TypeScript, and Node >=20."
      - "Packages: @async/pipeline-core, @async/pipeline-node, @async/pipeline-adapter-lima, @async/pipeline."
      - "CLI commands: run, run-task, list, graph, explain, doctor."
      - "Execution records live under .async/runs and local cache under .async/cache/tasks."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: unknown
  worker: unknown
  judge: unknown

